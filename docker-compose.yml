services:

  minio:
    image: minio/minio:latest
    container_name: bunq-minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bunq-db
    environment:
      POSTGRES_DB:       bunq
      POSTGRES_USER:     bunq
      POSTGRES_PASSWORD: bunq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bunq-backend
    ports:
      - "9191:9191"
    env_file: .env
    environment:
      DATABASE_URL:             postgresql://bunq:bunq@db:5432/bunq
      STORAGE_ENDPOINT:         http://minio:9000
      STORAGE_PUBLIC_URL:       http://localhost:9000/bunq-events
    volumes:
      - ./backend/src:/app/src
      - ./.bunq:/app/.bunq:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  mastra:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bunq-mastra
    ports:
      - "4111:4111"
    env_file: .env
    environment:
      DATABASE_URL:     postgresql://bunq:bunq@db:5432/bunq
      STORAGE_ENDPOINT: http://minio:9000
    volumes:
      - ./backend/src:/app/src
      - ./.bunq:/app/.bunq:ro
    command: npx mastra dev --dir src/mastra
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bunq-frontend
    ports:
      - "9292:9292"
    environment:
      - VITE_API_URL=/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
